<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practice - Clara</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .orange-bold {
            color: orange;
            font-weight: bold;
        }
        .h1-internal {
            color: darkcyan;
        }
        .h3-internal {
            color: darkred;
        }
    </style>
</head>
<body>

    <h2>Paragraphs</h2>
    <p style="color: blue; font-style: italic;">Paragraph 1 (Inline: Blue & Italics)</p>
    
    <p class="orange-bold">Paragraph 2 (Internal: Orange & Bold)</p>
    
    <p class="purple-underline">Paragraph 3 (External: Purple & Underline)</p>

    <hr>

    <h2>Highlights</h2>
    <h1 style="color: crimson;">Highlight 1 (Inline)</h1>
    <h1 class="h1-internal">Highlight 2 (Internal)</h1>
    <h1 class="h1-external">Highlight 3 (External)</h1>

    <hr>

    <h2>Buildings</h2>
    <h3 style="color: forestgreen;">Building 1 (Inline)</h3>
    <h3 class="h3-internal">Building 2 (Internal)</h3>
    <h3 class="h3-external">Building 3 (External)</h3>

</body>
</html>
